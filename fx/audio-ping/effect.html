<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"><title>Audio ping</title>
<style>
  html,body{margin:0;height:100%;background:linear-gradient(135deg,#FFFAEF,#FED7AA);font:16px 'Inter',sans-serif;color:#1E3A5F}
  .stage{height:100%;display:grid;place-items:center;text-align:center;padding:20px}
  h2{font:800 22px/1.2 'Inter',sans-serif;letter-spacing:-.4px;margin:0 0 8px}
  p{margin:0 0 18px;color:#2C547F;max-width:380px}
  button{padding:14px 28px;border-radius:12px;border:0;background:#1E3A5F;color:#FFFAEF;font:700 14px/1 'Inter',sans-serif;cursor:pointer;box-shadow:0 4px 16px rgba(30,58,95,.25);letter-spacing:.5px}
  button + button{margin-left:8px;background:#F4A442;color:#1E3A5F}
  .pulse{display:inline-block;width:8px;height:8px;border-radius:50%;background:#22C55E;margin-right:8px;vertical-align:middle;animation:pulse 1.4s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
  .meter{display:flex;gap:3px;justify-content:center;margin-top:18px}
  .meter b{display:block;width:5px;height:18px;background:rgba(30,58,95,.20);border-radius:2px;transition:transform .12s,background .12s}
  .meter b.on{background:#F4A442;transform:scaleY(1.4)}
</style>
</head><body>
<div class="stage">
  <div>
    <h2><span class="pulse"></span>Motion tracker</h2>
    <p>Click <strong>Single ping</strong> or <strong>Auto sweep</strong>. Web Audio synth, no files. Customise in the panel →</p>
    <button onclick="window.fxPing()">Single ping</button>
    <button id="sweep" onclick="window.fxSweep()">Auto sweep</button>
    <div class="meter" id="meter">
      <b></b><b></b><b></b><b></b><b></b><b></b><b></b><b></b><b></b><b></b><b></b><b></b>
    </div>
  </div>
</div>
<script>
window.PARAMS = window.PARAMS || {
  pitch: 880,
  pitchEnd: 360,
  decay: 0.25,
  volume: 0.18,
  waveform: 'sine',
  sweepInterval: 1100
};
(function(){
  var ctx, sweepTimer;
  function audio(){ return ctx = ctx || new (window.AudioContext||window.webkitAudioContext)(); }
  function ping(){
    var c = audio();
    var now = c.currentTime;
    var osc = c.createOscillator();
    osc.type = PARAMS.waveform;
    osc.frequency.setValueAtTime(PARAMS.pitch, now);
    osc.frequency.exponentialRampToValueAtTime(Math.max(20, PARAMS.pitchEnd), now + PARAMS.decay * 0.7);
    var g = c.createGain();
    g.gain.setValueAtTime(0.001, now);
    g.gain.exponentialRampToValueAtTime(PARAMS.volume, now + 0.005);
    g.gain.exponentialRampToValueAtTime(0.001, now + PARAMS.decay);
    osc.connect(g).connect(c.destination);
    osc.start(now); osc.stop(now + PARAMS.decay + 0.05);
    flashMeter();
  }
  function flashMeter(){
    var bars = document.querySelectorAll('#meter b');
    var idx = Math.floor(Math.random() * bars.length);
    bars[idx].classList.add('on');
    setTimeout(function(){ bars[idx].classList.remove('on'); }, 120);
  }
  function sweep(){
    if (sweepTimer) { clearInterval(sweepTimer); sweepTimer = null; document.getElementById('sweep').textContent = 'Auto sweep'; return; }
    document.getElementById('sweep').textContent = 'Stop';
    ping();
    sweepTimer = setInterval(ping, PARAMS.sweepInterval);
  }
  window.fxPing = ping;
  window.fxSweep = sweep;
  window.__seed = function(){
    if (sweepTimer) { clearInterval(sweepTimer); sweep(); }
  };
})();
</script>
</body></html>
