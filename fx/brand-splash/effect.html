<!doctype html>
<html><head><meta charset="utf-8"><title>Brand splash</title>
<style>
html,body{margin:0;height:100%;background:#C8102E;font-family:Georgia,serif;overflow:hidden;display:grid;place-items:center}
.loader-initials{font-size:48px;font-weight:700;color:#fff;letter-spacing:.08em;line-height:1;text-align:center}
.loader-bar{width:32px;height:2px;background:#D4A843;margin:18px auto 0;border-radius:2px;animation:lp 1.3s ease-in-out infinite}
@keyframes lp{0%,100%{width:16px;opacity:.35}50%{width:48px;opacity:1}}
</style>
</head><body>
<div>
  <div class="loader-initials">OŠ</div>
  <div class="loader-bar"></div>
</div>
</body></html>
