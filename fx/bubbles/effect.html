<!doctype html>
<html><head><meta charset="utf-8"><title>Bubbles</title>
<style>html,body{margin:0;height:100%;background:#FDE7F1;overflow:hidden}canvas{display:block;width:100%;height:100%}</style></head><body>
<canvas id="c"></canvas>
<script>
var c=document.getElementById('c'),x=c.getContext('2d'),W,H,P=[];
function resize(){W=c.width=innerWidth;H=c.height=innerHeight;P=[];for(var i=0;i<40;i++)P.push({x:Math.random()*W,y:Math.random()*H,r:8+Math.random()*42,vy:.8*(.6+Math.random()*.8),sw:Math.random()*Math.PI*2,swSpd:.02+Math.random()*.02,alpha:.15+Math.random()*.35});}
function loop(){x.clearRect(0,0,W,H);P.forEach(function(p){p.y-=p.vy;p.sw+=p.swSpd;p.x+=Math.sin(p.sw)*.4;if(p.y<-p.r*2){p.y=H+30;p.x=Math.random()*W;}var g=x.createRadialGradient(p.x-p.r*.3,p.y-p.r*.3,p.r*.1,p.x,p.y,p.r);g.addColorStop(0,'#fff');g.addColorStop(.7,'#EC4899');g.addColorStop(1,'rgba(0,0,0,0)');x.globalAlpha=p.alpha;x.fillStyle=g;x.beginPath();x.arc(p.x,p.y,p.r,0,Math.PI*2);x.fill();x.strokeStyle='#fff';x.lineWidth=1;x.globalAlpha=p.alpha*.6;x.stroke();x.globalAlpha=1;});requestAnimationFrame(loop);}
addEventListener('resize',resize);resize();loop();
</script></body></html>
