<!doctype html>
<html><head><meta charset="utf-8"><title>Coins</title>
<style>html,body{margin:0;height:100%;background:#0B2A4A;overflow:hidden}canvas{display:block;width:100%;height:100%}</style></head><body>
<canvas id="c"></canvas>
<script>
var c=document.getElementById('c'),x=c.getContext('2d'),W,H,P=[];
function resize(){W=c.width=innerWidth;H=c.height=innerHeight;P=[];for(var i=0;i<24;i++)P.push({x:Math.random()*W,y:Math.random()*H,vx:(Math.random()-.5)*.4,vy:1.4*(.6+Math.random()*.8),r:18*(.6+Math.random()*.7),rot:Math.random()*Math.PI*2,vrot:(Math.random()-.5)*.06,col:Math.random()<.5?'#FACC15':'#F59E0B'});}
function loop(){x.clearRect(0,0,W,H);P.forEach(function(p){p.x+=p.vx;p.y+=p.vy;p.rot+=p.vrot;if(p.y>H+50){p.y=-30;p.x=Math.random()*W;}x.save();x.translate(p.x,p.y);x.rotate(p.rot);var w=Math.abs(Math.cos(p.rot))*p.r+2;x.fillStyle=p.col;x.beginPath();x.ellipse(0,0,w,p.r,0,0,Math.PI*2);x.fill();x.strokeStyle='rgba(0,0,0,.25)';x.lineWidth=1;x.stroke();x.restore();});requestAnimationFrame(loop);}
addEventListener('resize',resize);resize();loop();
</script></body></html>
