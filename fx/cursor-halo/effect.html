<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"><title>Cursor halo</title>
<style>
  html,body{margin:0;height:100%;background:#FFFAEF;cursor:none;font:16px 'Inter',sans-serif;color:#2C547F;overflow:hidden}
  .stage{height:100%;display:grid;place-items:center;text-align:center}
  .stage p{font-size:18px;line-height:1.6;max-width:480px;padding:0 24px}
  .stage p strong{color:#1E3A5F;font-weight:700}
  .stage a{color:#F4A442;text-decoration:underline}
  button.demo{margin-top:18px;padding:14px 28px;border:0;border-radius:12px;background:#1E3A5F;color:#FFFAEF;font:600 15px/1 'Inter',sans-serif;cursor:none;box-shadow:0 4px 16px rgba(30,58,95,.25)}
  .cursor-dot,.cursor-ring{position:fixed;top:0;left:0;pointer-events:none;z-index:9999}
  .cursor-dot{width:12px;height:12px;margin:-6px 0 0 -6px;border-radius:50%}
  .cursor-ring{border-radius:50%;border:2px solid var(--ring-color,#1E3A5F);transition:width .25s cubic-bezier(.4,0,.2,1),height .25s cubic-bezier(.4,0,.2,1),margin .25s cubic-bezier(.4,0,.2,1),background .25s cubic-bezier(.4,0,.2,1),border-color .25s cubic-bezier(.4,0,.2,1)}
</style>
</head><body>
<div class="stage">
  <div>
    <p><strong>Move the mouse</strong>. The cursor's a dot with a smart trailing ring — <a href="#">links</a> grow the ring, <button class="demo">buttons</button> shift to hover state.</p>
  </div>
</div>
<div class="cursor-dot" id="dot"></div>
<div class="cursor-ring" id="ring"></div>
<script>
window.PARAMS = window.PARAMS || {
  dotSize: 12,
  ringSize: 44,
  ringHover: 72,
  dotColor: '#1E3A5F',
  ringColor: '#1E3A5F',
  hoverColor: '#F4A442',
  haloColor: '#FFFAEF',
  smoothing: 0.20
};
(function(){
  var dot = document.getElementById('dot');
  var ring = document.getElementById('ring');
  function apply() {
    dot.style.width = dot.style.height = PARAMS.dotSize + 'px';
    dot.style.margin = -PARAMS.dotSize/2 + 'px 0 0 ' + -PARAMS.dotSize/2 + 'px';
    dot.style.background = PARAMS.dotColor;
    dot.style.boxShadow = '0 0 0 3px ' + PARAMS.haloColor + ', 0 0 0 4px rgba(30,58,95,.45)';
    ring.style.borderColor = PARAMS.ringColor;
    ring.style.setProperty('--ring-color', PARAMS.ringColor);
    setRingSize(false);
  }
  function setRingSize(hover){
    var s = hover ? PARAMS.ringHover : PARAMS.ringSize;
    ring.style.width = ring.style.height = s + 'px';
    ring.style.margin = -s/2 + 'px 0 0 ' + -s/2 + 'px';
    ring.style.background = hover ? PARAMS.hoverColor.replace('#','rgba(') /*placeholder*/ : 'transparent';
    if (hover) {
      ring.style.background = 'rgba(244,164,66,.16)';
      ring.style.borderColor = PARAMS.hoverColor;
    } else {
      ring.style.background = 'transparent';
      ring.style.borderColor = PARAMS.ringColor;
    }
  }
  apply();
  var tx=0, ty=0, rx=0, ry=0;
  window.addEventListener('mousemove', function(e){
    tx=e.clientX; ty=e.clientY;
    dot.style.transform='translate('+tx+'px,'+ty+'px)';
  });
  function tick(){
    rx += (tx - rx) * PARAMS.smoothing;
    ry += (ty - ry) * PARAMS.smoothing;
    ring.style.transform='translate('+rx+'px,'+ry+'px)';
    requestAnimationFrame(tick);
  }
  tick();
  document.addEventListener('mouseover', function(e){
    if (e.target.closest && e.target.closest('a, button, input, [role=button]')) setRingSize(true);
  });
  document.addEventListener('mouseout', function(e){
    if (e.target.closest && e.target.closest('a, button, input, [role=button]')) setRingSize(false);
  });
  window.__seed = apply;
})();
</script>
</body></html>
