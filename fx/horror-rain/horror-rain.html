<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Blood Rain — Horror Background</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
canvas { display: block; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const cvs = document.getElementById('c');
const ctx  = cvs.getContext('2d');
let W, H;

function resize() {
  W = cvs.width  = window.innerWidth;
  H = cvs.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// ── LIGHTNING ─────────────────────────────────────────────────────────────────
let flashA     = 0;         // screen flash brightness [0..1]
let lightBolts = [];        // active bolt objects
let ltTick     = 0;
let ltDelay    = 90 + Math.random() * 140;

/**
 * Midpoint-displacement bolt.
 * Returns array of [x1,y1,x2,y2] line segments.
 */
function buildBolt(x1, y1, x2, y2, depth, spread) {
  if (depth <= 0) return [[x1, y1, x2, y2]];
  const mx = (x1 + x2) * 0.5, my = (y1 + y2) * 0.5;
  const dx = x2 - x1, dy = y2 - y1;
  const L  = Math.hypot(dx, dy) || 1;
  const d  = (Math.random() - 0.5) * spread;
  const nx = mx + (-dy / L) * d, ny = my + (dx / L) * d;
  const out = [
    ...buildBolt(x1, y1, nx, ny, depth - 1, spread * 0.63),
    ...buildBolt(nx, ny, x2, y2, depth - 1, spread * 0.63),
  ];
  // Random branch
  if (depth >= 3 && Math.random() < 0.52) {
    const ang = Math.atan2(dy, dx) + (Math.random() - 0.5) * 1.5;
    const bL  = L * (0.25 + Math.random() * 0.38);
    out.push(...buildBolt(
      nx, ny,
      nx + Math.cos(ang) * bL,
      ny + Math.sin(ang) * bL,
      depth - 2, spread * 0.42
    ));
  }
  return out;
}

function fireLightning() {
  const ox = W * (0.12 + Math.random() * 0.76);
  const ex = ox + (Math.random() - 0.5) * W * 0.22;
  const ey = H * (0.42 + Math.random() * 0.48);
  lightBolts.push({
    segs: buildBolt(ox, 0, ex, ey, 7, W * 0.22),
    life: 1.0,
    fade: 0.033 + Math.random() * 0.03,
  });
  flashA = Math.max(flashA, 0.48 + Math.random() * 0.22);
  puddles.forEach(p => {
    p.lit = 1;
    if (Math.random() < 0.7) addRipple(p);
  });
  // Occasional double-strike with short delay
  if (Math.random() < 0.42) {
    setTimeout(() => {
      const ox2 = ox + (Math.random() - 0.5) * W * 0.12;
      lightBolts.push({
        segs: buildBolt(
          ox2, 0,
          ox2 + (Math.random() - 0.5) * W * 0.1,
          H * (0.5 + Math.random() * 0.32),
          6, W * 0.15
        ),
        life: 0.72, fade: 0.055,
      });
      flashA = Math.max(flashA, 0.22);
      puddles.forEach(p => { p.lit = Math.max(p.lit, 0.6); });
    }, 70 + Math.random() * 130);
  }
}

// ── BLOOD RAIN ────────────────────────────────────────────────────────────────
const N_DROPS = 480;
const WIND    = 0.22;  // tilt angle (radians from vertical)
const drops   = [];

function mkDrop(scatter) {
  const spd = 10 + Math.random() * 16;
  const len = spd * (1.4 + Math.random() * 0.9);
  return {
    x:  Math.random() * (W * 1.4) - W * 0.2,
    y:  scatter ? Math.random() * H : (-len - Math.random() * H * 0.6),
    vx: -Math.sin(WIND) * spd,
    vy:  Math.cos(WIND) * spd,
    len,
    a:  0.18 + Math.random() * 0.48,
    r:  148 + Math.random() * 60,   // red channel base
  };
}
for (let i = 0; i < N_DROPS; i++) drops.push(mkDrop(true));

// ── PUDDLES ───────────────────────────────────────────────────────────────────
let puddles = [];

function initPuddles() {
  puddles = [];
  for (let i = 0; i < 7; i++) puddles.push({
    x:   W * (0.04 + Math.random() * 0.92),
    y:   H * (0.89 + Math.random() * 0.07),
    rx:  24 + Math.random() * 60,   // horizontal radius
    ry:   6 + Math.random() * 16,   // vertical radius (flat ellipse)
    vol: 0.05 + Math.random() * 0.25, // fill level [0..1]
    lit: 0,                          // lightning highlight [0..1]
    ripples: [],
  });
}
initPuddles();
window.addEventListener('resize', () => { resize(); initPuddles(); });

function addRipple(p) {
  p.ripples.push({
    rx: 2, ry: 1,
    a:  0.55 + Math.random() * 0.35,
    spd: 0.6 + Math.random() * 0.8,
  });
}

// ── SKY & SCENE ───────────────────────────────────────────────────────────────
function drawSky() {
  // Deep purple-black sky gradient
  const sk = ctx.createLinearGradient(0, 0, 0, H);
  sk.addColorStop(0,    '#030108');
  sk.addColorStop(0.5,  '#060210');
  sk.addColorStop(0.85, '#0e0308');
  sk.addColorStop(1,    '#150004');
  ctx.fillStyle = sk;
  ctx.fillRect(0, 0, W, H);

  // Dark cloud masses (radial blobs)
  for (const [cx, cy, r, col] of [
    [W * .28, H * .18, W * .48, 'rgba(22,4,35,.28)'],
    [W * .68, H * .10, W * .42, 'rgba(14,2,28,.32)'],
    [W * .50, H * .38, W * .38, 'rgba(18,0,14,.22)'],
    [W * .15, H * .30, W * .30, 'rgba(10,0,20,.18)'],
    [W * .82, H * .45, W * .28, 'rgba(8,0,16,.20)'],
  ]) {
    const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, r);
    g.addColorStop(0, col);
    g.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, W, H);
  }

  // Ground plane
  const gn = ctx.createLinearGradient(0, H * 0.84, 0, H);
  gn.addColorStop(0, '#0c0004');
  gn.addColorStop(1, '#070002');
  ctx.fillStyle = gn;
  ctx.fillRect(0, H * 0.84, W, H * 0.16);

  // Faint blood-red horizon glow (ground reflection)
  const hg = ctx.createLinearGradient(0, H * 0.82, 0, H * 0.93);
  hg.addColorStop(0,    'rgba(55,0,0,0)');
  hg.addColorStop(0.45, 'rgba(40,0,0,.16)');
  hg.addColorStop(1,    'rgba(0,0,0,0)');
  ctx.fillStyle = hg;
  ctx.fillRect(0, H * 0.82, W, H * 0.11);
}

function drawPuddles() {
  puddles.forEach(p => {
    const rx  = p.rx * (0.45 + p.vol * 0.55);  // grows with volume
    const ry  = p.ry * (0.45 + p.vol * 0.55);
    const asp = ry / rx;

    // Blood pool fill — scale-trick to get ellipse from radial gradient
    ctx.save();
    ctx.translate(p.x, p.y);
    ctx.scale(1, asp);

    const fa = 0.5 + p.vol * 0.45;
    const g  = ctx.createRadialGradient(0, 0, 0, 0, 0, rx);
    g.addColorStop(0,    `rgba(125,0,5,${fa.toFixed(2)})`);
    g.addColorStop(0.5,  `rgba(80,0,3,${(fa * 0.85).toFixed(2)})`);
    g.addColorStop(0.85, `rgba(35,0,0,${(fa * 0.48).toFixed(2)})`);
    g.addColorStop(1,    'rgba(0,0,0,0)');
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.arc(0, 0, rx, 0, Math.PI * 2);
    ctx.fill();

    // Lightning specular highlight — asymmetric spot
    if (p.lit > 0.04) {
      const sg = ctx.createRadialGradient(-rx * .15, -rx * .22, 0, rx * .05, rx * .05, rx * .82);
      sg.addColorStop(0,    `rgba(255,150,135,${(p.lit * 0.55).toFixed(2)})`);
      sg.addColorStop(0.4,  `rgba(200,60,60,${(p.lit * 0.20).toFixed(2)})`);
      sg.addColorStop(1,    'rgba(0,0,0,0)');
      ctx.fillStyle = sg;
      ctx.beginPath();
      ctx.arc(0, 0, rx, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();

    // Ripples (screen-space — not scaled)
    ctx.lineCap = 'round';
    p.ripples.forEach(r => {
      ctx.beginPath();
      ctx.ellipse(p.x, p.y, r.rx, r.ry, 0, 0, Math.PI * 2);
      ctx.strokeStyle = `rgba(190,15,15,${r.a.toFixed(2)})`;
      ctx.lineWidth   = 1.3;
      ctx.stroke();
      r.rx += r.spd;
      r.ry += r.spd * asp;
      r.a  -= 0.007;
    });
    p.ripples = p.ripples.filter(r => r.a > 0);

    p.vol = Math.min(1, p.vol + 0.00025);   // slow accumulation
    p.lit *= 0.96;                           // highlight fades
  });
}

function drawRain() {
  ctx.lineCap = 'round';
  drops.forEach(d => {
    d.x += d.vx;
    d.y += d.vy;

    // Brighten drops during lightning flash
    const lt = flashA * 0.65;
    const cr = Math.min(255, d.r + lt * 130) | 0;
    const cg = (lt * 38) | 0;
    const cb = (lt * 48) | 0;
    const ca = Math.min(1, d.a + lt * 0.38);

    // Streak tail (direction opposite to velocity)
    const mag = Math.hypot(d.vx, d.vy);
    const tx  = d.x - (d.vx / mag) * d.len;
    const ty  = d.y - (d.vy / mag) * d.len;

    ctx.beginPath();
    ctx.moveTo(d.x, d.y);
    ctx.lineTo(tx, ty);
    ctx.strokeStyle = `rgba(${cr},${cg},${cb},${ca.toFixed(2)})`;
    ctx.lineWidth   = lt > 0.12 ? 1.5 : 0.9;
    ctx.stroke();

    // Hit ground — ripple nearby puddle
    if (d.y > H * 0.88) {
      puddles.forEach(p => {
        if (Math.abs(d.x - p.x) < p.rx * (0.5 + p.vol * 0.5) * 1.3 && Math.random() < 0.025) {
          addRipple(p);
          p.vol = Math.min(1, p.vol + 0.0007);
        }
      });
      Object.assign(d, mkDrop(false));
    }
    if (d.x < -W * 0.2) d.x =  W * 1.1;
    if (d.x >  W * 1.2) d.x = -W * 0.1;
  });
}

function drawBolts() {
  ctx.save();
  ctx.lineCap = 'round';
  lightBolts.forEach(b => {
    // Outer glow pass
    ctx.shadowBlur  = 28;
    ctx.shadowColor = 'rgba(190,225,255,.95)';
    ctx.strokeStyle = `rgba(215,240,255,${(b.life * 0.88).toFixed(2)})`;
    ctx.lineWidth   = 2.5;
    ctx.beginPath();
    b.segs.forEach(([ax, ay, bx, by]) => { ctx.moveTo(ax, ay); ctx.lineTo(bx, by); });
    ctx.stroke();

    // Bright core pass (main trunk only)
    ctx.shadowBlur  = 7;
    ctx.shadowColor = 'rgba(255,255,255,1)';
    ctx.strokeStyle = `rgba(252,255,255,${b.life.toFixed(2)})`;
    ctx.lineWidth   = 1.1;
    ctx.beginPath();
    b.segs.slice(0, b.segs.length >> 1).forEach(([ax, ay, bx, by]) => {
      ctx.moveTo(ax, ay); ctx.lineTo(bx, by);
    });
    ctx.stroke();

    b.life -= b.fade;
  });
  ctx.restore();
  lightBolts = lightBolts.filter(b => b.life > 0);
}

function drawFog() {
  // Ground mist / rising dampness
  const f = ctx.createLinearGradient(0, H * 0.77, 0, H);
  f.addColorStop(0,    'rgba(6,0,4,0)');
  f.addColorStop(0.5,  'rgba(10,0,5,.30)');
  f.addColorStop(1,    'rgba(14,0,6,.62)');
  ctx.fillStyle = f;
  ctx.fillRect(0, H * 0.77, W, H * 0.23);
}

function drawVignette() {
  const r = Math.min(W, H) * 0.75;
  const v = ctx.createRadialGradient(W * 0.5, H * 0.5, r * 0.35, W * 0.5, H * 0.5, r);
  v.addColorStop(0, 'rgba(0,0,0,0)');
  v.addColorStop(1, 'rgba(0,0,0,0.55)');
  ctx.fillStyle = v;
  ctx.fillRect(0, 0, W, H);
}

function drawFlash() {
  if (flashA < 0.01) return;
  // Cold blue-white screen flash
  ctx.fillStyle = `rgba(205,228,255,${(flashA * 0.27).toFixed(2)})`;
  ctx.fillRect(0, 0, W, H);
  flashA *= 0.86;
}

// ── MAIN LOOP ─────────────────────────────────────────────────────────────────
function frame() {
  ctx.clearRect(0, 0, W, H);

  drawSky();
  drawPuddles();
  drawRain();
  drawFog();
  drawVignette();
  drawBolts();
  drawFlash();

  // Ambient ripples — simulates drops falling outside the visible area
  if (Math.random() < 0.018) {
    addRipple(puddles[Math.floor(Math.random() * puddles.length)]);
  }

  // Lightning timing
  if (++ltTick >= ltDelay) {
    fireLightning();
    ltTick  = 0;
    // Occasionally storm bursts (rapid strikes), otherwise long pauses
    ltDelay = Math.random() < 0.28
      ? 8  + Math.random() * 18
      : 88 + Math.random() * 172;
  }

  requestAnimationFrame(frame);
}
frame();
</script>
</body>
</html>
