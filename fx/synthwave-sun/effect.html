<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"><title>Synthwave sun</title>
<style>
html,body{margin:0;height:100%;overflow:hidden;font-family:system-ui,sans-serif}
.sky{position:absolute;inset:0;background:linear-gradient(180deg,#0a0a14 0%,#7C3AED 60%,#F4A442 100%)}
.stars{position:absolute;inset:0;background-image:radial-gradient(1px 1px at 14% 18%,#fff 1px,transparent 2px),radial-gradient(1.5px 1.5px at 32% 12%,#fff 1px,transparent 2px),radial-gradient(1px 1px at 58% 22%,#fff 1px,transparent 2px),radial-gradient(1px 1px at 72% 8%,#fff 1px,transparent 2px),radial-gradient(1.5px 1.5px at 86% 28%,#fff 1px,transparent 2px),radial-gradient(1px 1px at 22% 30%,#fff 1px,transparent 2px);opacity:.6}
.sun-wrap{position:absolute;left:50%;top:35%;transform:translate(-50%,-50%);width:42vmin;height:42vmin;filter:drop-shadow(0 0 60px #FACC15)}
.sun{position:absolute;inset:0;border-radius:50%;background:linear-gradient(180deg,#FACC15 0%,#F4A442 50%,#7C3AED 100%);box-shadow:0 0 80px #FACC15,0 0 160px #FACC1588}
.scan{position:absolute;inset:0;border-radius:50%;background:repeating-linear-gradient(180deg,transparent 0,transparent 22px,#0a0a14 22px,#0a0a14 28px);-webkit-mask-image:linear-gradient(180deg,transparent 0%,#000 35%,#000 100%);mask-image:linear-gradient(180deg,transparent 0%,#000 35%,#000 100%)}
.ground{position:absolute;left:0;right:0;bottom:0;height:36%;background:radial-gradient(ellipse at 50% 100%,#1a1f28 0%,#0a0a14 60%,#000 100%)}
.pine{position:absolute;bottom:0;background:#000;clip-path:polygon(50% 0,100% 35%,70% 35%,100% 65%,70% 65%,100% 100%,0 100%,30% 65%,0 65%,30% 35%,0 35%)}
.pine.p1{left:8%;width:30px;height:120px}
.pine.p2{left:22%;width:34px;height:160px}
.pine.p3{left:38%;width:26px;height:100px}
.pine.p4{right:30%;width:30px;height:140px}
.pine.p5{right:14%;width:34px;height:180px}
.pine.p6{right:2%;width:24px;height:90px}
</style>
</head><body>
<div class="sky"></div><div class="stars"></div><div class="ground"></div><div class="pine p1"></div><div class="pine p2"></div><div class="pine p3"></div><div class="pine p4"></div><div class="pine p5"></div><div class="pine p6"></div><div class="sun-wrap"><div class="sun"></div><div class="scan"></div></div>
</body></html>
