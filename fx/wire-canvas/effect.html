<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"><title>Wire canvas</title>
<style>html,body{margin:0;height:100%;background:#FFFAEF;overflow:hidden}canvas{display:block;width:100%;height:100%}</style>
</head><body>
<canvas id="c"></canvas>
<script>
window.PARAMS = window.PARAMS || {
  count: 90,
  linkDistance: 0.18,
  speed: 0.5,
  size: 2.5,
  color: '#2C547F',
  accentColor: '#F4A442',
  alpha: 0.35,
  lineWidth: 0.9
};
(function () {
  var canvas = document.getElementById('c');
  var ctx = canvas.getContext('2d');
  var W, H, parts = [];

  function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
    seed();
  }

  function seed() {
    parts.length = 0;
    var n = PARAMS.count;
    for (var i = 0; i < n; i++) {
      parts.push({
        x: Math.random() * W,
        y: Math.random() * H,
        vx: (Math.random() - 0.5) * PARAMS.speed,
        vy: (Math.random() - 0.5) * PARAMS.speed * 0.6 + 0.02,
        size: Math.random() * PARAMS.size + 1,
        alpha: Math.random() * 0.4 + 0.3,
        accent: Math.random() < 0.25
      });
    }
  }

  function hex2rgb(h) {
    return parseInt(h.slice(1,3),16)+','+parseInt(h.slice(3,5),16)+','+parseInt(h.slice(5,7),16);
  }

  function loop() {
    ctx.clearRect(0, 0, W, H);
    var link = Math.max(80, Math.min(W, H) * PARAMS.linkDistance);
    var rgbMain = hex2rgb(PARAMS.color);
    var rgbAccent = hex2rgb(PARAMS.accentColor);

    for (var i = 0; i < parts.length; i++) {
      var p = parts[i];
      p.x += p.vx; p.y += p.vy;
      if (p.x < 0) { p.x = 0; p.vx = Math.abs(p.vx); }
      if (p.x > W) { p.x = W; p.vx = -Math.abs(p.vx); }
      if (p.y < 0) { p.y = 0; p.vy = Math.abs(p.vy); }
      if (p.y > H) { p.y = H; p.vy = -Math.abs(p.vy); }

      var rgb = p.accent ? rgbAccent : rgbMain;

      for (var j = i + 1; j < parts.length; j++) {
        var q = parts[j];
        var dx = p.x - q.x, dy = p.y - q.y;
        var d = Math.sqrt(dx * dx + dy * dy);
        if (d < link) {
          var a = (1 - d / link) * PARAMS.alpha;
          ctx.strokeStyle = 'rgba(' + rgb + ',' + a + ')';
          ctx.lineWidth = PARAMS.lineWidth;
          ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(q.x, q.y); ctx.stroke();
        }
      }
      ctx.fillStyle = 'rgba(' + rgb + ',' + p.alpha + ')';
      ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill();
    }
    requestAnimationFrame(loop);
  }

  window.addEventListener('resize', resize);
  window.__seed = seed;
  resize();
  loop();
})();
</script>
</body></html>
